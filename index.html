<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Cutie! 🎉</title>
  <style>
    /* Final Styling for the Cartoon Character Webpage */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe5ec, #ffc2d1); /* Warm, celebratory gradient */
      font-family: 'Poppins', sans-serif; /* Friendly font */
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 1. Speech Bubble Style (Pointing Up) */
    .speech-bubble {
      background: white;
      padding: 18px 25px;
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 1.15rem;
      font-weight: 600;
      color: #4a4a4a;
      max-width: 280px;
      text-align: center;
      cursor: pointer;
      position: relative;
      margin-bottom: 20px; /* Space above character */
      transition: all 0.2s ease;
      z-index: 10;
    }

    /* Bubble triangle */
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px 12px 0;
      border-style: solid;
      border-color: white transparent;
    }

    .speech-bubble:hover {
      transform: scale(1.05);
      background: #fdfdfd;
    }

    /* 2. Character Image Styling (No Border) */
    .character {
      width: 250px; /* Perfect size for the full body cartoon */
      height: auto; /* Mantains original aspect ratio */
      object-fit: contain;
      user-select: none; /* Prevents selecting the image */
      transform: scale(2.0);
      /* Applying the entrance and idle animations */
      animation: 
        slideUpFade 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
        floatingAction 3.5s ease-in-out infinite 1.2s; 
    }

    /* 3. Animations */
    
    /* Smooth Entrance */
    @keyframes slideUpFade {
      0% { transform: translateY(150px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Continuous Gentle Floating/Hopping */
    @keyframes floatingAction {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-18px) rotate(1deg); } /* Extra rotation adds dynamic feel */
      100% { transform: translateY(0px); }
    }

    /* Quick jump animation triggered by JS on click */
    @keyframes hop {
      0% { transform: translateY(0); }
      50% { transform: translateY(-50px) scale(1.05); }
      100% { transform: translateY(0); }
    }
    
    /* Background accents (optional hearts/stars) */
    .bg-accent {
      position: absolute;
      opacity: 0.2;
      animation: drift 10s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-200px) rotate(360deg); }
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <!-- The Text Bubble (She clicks this) -->
    <div class="speech-bubble" id="bubble" onclick="nextMessage()">
      Hey dummy! Happy Birthday! 🎉 (Click me)
    </div>

    <!-- Your Cartoon Character (Dynamic full body image) -->
    <img 
      src="cartoon-you.png" 
      alt="Cartoon Me" 
      class="character" 
      id="myCharacter"
    >
  </div>

  <script>
    // This is where you customize your story/clues!
    const messages = [
      "I set up a few surprises for you today...",
      "Your first clue is hiding where we keep the coffee mugs ☕",
      "Go check it out, then come back and click me again for Clue #2!",
      "Ready? Clue #2: Look inside your favorite jacket pocket... 🧥",
      "Final step: Check your email. I sent you the tickets! ✈️ ❤️"
    ];

    let currentIndex = 0;

    function nextMessage() {
      const bubble = document.getElementById("bubble");
      const character = document.getElementById("myCharacter");

      if (currentIndex < messages.length) {
        // Change text
        bubble.innerText = messages[currentIndex];
        currentIndex++;

        // Make the character visually REACT with a big excited jump
        character.style.animation = "hop 0.5s cubic-bezier(0.3, 0, 0.2, 1)";
        
        // Reset back to idle floating animation when the jump finishes
        setTimeout(() => {
          character.style.animation = "floatingAction 3.5s ease-in-out infinite";
        }, 500);

      } else {
        // The final surprise complete message
        bubble.innerText = "That's all the clues! I love you, hope you have the best day! 🥰";
        
        // Final pose (gentle fade in place)
        character.style.animation = "floatingAction 6s ease-in-out infinite";
      }
    }
  </script>
</body>
</html>
