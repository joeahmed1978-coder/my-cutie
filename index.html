<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Cutie! 🎉</title>
  <style>
    /* Final Styling for the Cartoon Character Webpage */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe5ec, #ffc2d1); /* Warm, celebratory gradient */
      font-family: 'Poppins', sans-serif; /* Friendly font */
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 1. Speech Bubble Style (Pointing Up) */
    .speech-bubble {
      background: white;
      padding: 18px 25px;
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 1.15rem;
      font-weight: 600;
      color: #4a4a4a;
      max-width: 280px;
      text-align: center;
      cursor: pointer;
      position: relative;
      margin-bottom: 20px; /* Space above character */
      transition: all 0.2s ease;
      z-index: 10;
    }

    /* Bubble triangle */
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px 12px 0;
      border-style: solid;
      border-color: white transparent;
    }

    .speech-bubble:hover {
      transform: scale(1.05);
      background: #fdfdfd;
    }

    /* 2. Character Image Styling (No Border) */
    .character {
      width: 250px; /* Perfect size for the full body cartoon */
      height: auto; /* Mantains original aspect ratio */
      object-fit: contain;
      user-select: none; /* Prevents selecting the image */
      transform: scale(3.0);
      /* Applying the entrance and idle animations */
      animation: 
        slideUpFade 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
        floatingAction 3.5s ease-in-out infinite 1.2s; 
    }

    /* 3. Animations */
    
    /* Smooth Entrance */
    @keyframes slideUpFade {
      0% { transform: translateY(150px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Continuous Gentle Floating/Hopping */
    @keyframes floatingAction {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-18px) rotate(1deg); } /* Extra rotation adds dynamic feel */
      100% { transform: translateY(0px); }
    }

    /* Quick jump animation triggered by JS on click */
    @keyframes hop {
      0% { transform: translateY(0); }
      50% { transform: translateY(-50px) scale(1.05); }
      100% { transform: translateY(0); }
    }
    
    /* Background accents (optional hearts/stars) */
    .bg-accent {
      position: absolute;
      opacity: 0.2;
      animation: drift 10s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-200px) rotate(360deg); }
    }
.button-container {
    margin-top: 50px;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .btn {
    padding: 12px 28px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .yes-btn {
    background-color: #ff6b81;
    color: white;
  }

  .yes-btn:hover {
    background-color: #ff4757;
    transform: scale(1.1);
  }

  .no-btn {
    background-color: #f1f2f6;
    color: #57606f;
    position: relative;
  }/* --- HEART BALLOONS STYLING --- */
.balloon-container {
  position: fixed;
  bottom: -10px;
  width: 100%;
  height: 100%;
  pointer-events: none; /* This makes sure you can still click your character and buttons! */
  z-index: 1; /* Keeps them in the background */
}

.balloon {
  position: absolute;
  width: 100px;
  height: auto;
  animation: floatBalloon 6s ease-in-out infinite;
}

/* Individual balloon positions and custom speeds */
.balloon-left-1 { left: 5%; bottom: 15%; animation-duration: 5s; }
.balloon-left-2 { left: 12%; bottom: 35%; animation-duration: 7s; animation-delay: 1s; }
.balloon-right-1 { right: 5%; bottom: 20%; animation-duration: 5.5s; }
.balloon-right-2 { right: 15%; bottom: 40%; animation-duration: 6.5s; animation-delay: 1.5s; }

/* The gentle floating up and down animation */
@keyframes floatBalloon {
  0% {
    transform: translateY(0) rotate(-3deg);
  }
  50% {
    transform: translateY(-20px) rotate(3deg);
  }
  100% {
    transform: translateY(0) rotate(-3deg);
  }
}.balloon-right-2 { right: 15%; bottom: 40%; animation-duration: 6.5s; animation-delay: 1.5s; }

/* The gentle floating up and down animation */
@keyframes floatBalloon {
  0% {
    transform: translateY(0) rotate(-3deg);
  }
  50% {
    transform: translateY(-20px) rotate(3deg);
  }
  100% {
    transform: translateY(0) rotate(-3deg);
  } </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="balloon-container">
  
  <svg class="balloon balloon-left-1" viewBox="0 0 100 200">
    <path d="M50,30 C50,10 20,10 20,35 C20,60 50,85 50,95 C50,85 80,60 80,35 C80,10 50,10 50,30 Z" fill="#ff6b81" />
    <path d="M50,95 L50,200" stroke="#ffb3bc" stroke-width="1.5" fill="none" />
  </svg>

  <svg class="balloon balloon-left-2" viewBox="0 0 100 200">
    <path d="M50,30 C50,10 20,10 20,35 C20,60 50,85 50,95 C50,85 80,60 80,35 C80,10 50,10 50,30 Z" fill="#ffb3bc" />
    <path d="M50,95 L50,200" stroke="#ffd2d7" stroke-width="1.5" fill="none" />
  </svg>

  <svg class="balloon balloon-right-1" viewBox="0 0 100 200">
    <path d="M50,30 C50,10 20,10 20,35 C20,60 50,85 50,95 C50,85 80,60 80,35 C80,10 50,10 50,30 Z" fill="#ff4757" />
    <path d="M50,95 L50,200" stroke="#ffb3bc" stroke-width="1.5" fill="none" />
  </svg>

  <svg class="balloon balloon-right-2" viewBox="0 0 100 200">
    <path d="M50,30 C50,10 20,10 20,35 C20,60 50,85 50,95 C50,85 80,60 80,35 C80,10 50,10 50,30 Z" fill="#fff0f2" />
    <path d="M50,95 L50,200" stroke="#ffd2d7" stroke-width="1.5" fill="none" />
  </svg>

</div>
<audio id="bgMusic" src="birthday-song.mp3" loop></audio>
  <!-- Container for Character & Bubble -->
<div class="container">
  <!-- Speech Bubble -->
  <div class="speech-bubble" id="speechBubble">
    Hey,i have a surprise for u if you are my cutie 🎉<br>(Click me)
  </div>

  <!-- Your Cartoon Character -->
  <img 
    src="cartoon-you.png" 
    alt="Cartoon Me" 
    class="character" 
    id="myCharacter"
    onclick="startQuestion()"
  >

  <!-- Yes/No Buttons (Hidden by default) -->
  <div class="button-container" id="buttonContainer" style="display: none;">
    <button class="btn yes-btn" onclick="handleYes()">Yes</button>
    <button class="btn no-btn" id="noBtn" onmouseover="dodgeNo()" onclick="dodgeNo()">No</button>
  </div>
</div>

 <script>
  // 1. Define your list of questions here! You can add as many as you want.
  const questions = [
    "Are you ready for your birthday clues? 🎁",
    "Are you sure? There is no turning back! 😈",
    "Did you eat cake today? 🎂",
    "Okay, last question... are you absolutely, 100% ready? 🔥"
  ];

  let currentQuestionIndex = 0; // Tracks which question we are on

  // This runs when they click your cartoon character
  function startQuestion() {
    const bubble = document.getElementById('speechBubble');
    const btnContainer = document.getElementById('buttonContainer');
    const music = document.getElementById('bgMusic');
    
    // Play music if you added it
    if (music) {
      music.play().catch(error => {
        console.log("Audio play was prevented by browser.", error);
      });
    }

    // Reset back to the first question
    currentQuestionIndex = 0;
    bubble.innerHTML = questions[currentQuestionIndex];
    
    // Show the buttons
    btnContainer.style.display = 'flex';
    
    // Reset No button position in case it was moved
    document.getElementById('noBtn').style.transform = 'translate(0px, 0px)';
  }

  // This makes the "No" button jump away
  function dodgeNo() {
    const noBtn = document.getElementById('noBtn');
    const randomX = Math.random() * 150 - 75;
    const randomY = Math.random() * 80 - 40;
    noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
  }

  // This runs when they click "Yes"
  function handleYes() {
    const bubble = document.getElementById('speechBubble');
    const btnContainer = document.getElementById('buttonContainer');
    const noBtn = document.getElementById('noBtn');
    
    // Go to the next question index
    currentQuestionIndex++;
    
    // Check if we still have questions left
    if (currentQuestionIndex < questions.length) {
      // Show the next question
      bubble.innerHTML = questions[currentQuestionIndex];
      
      // Reset the "No" button back to the center so they can try (and fail) to click it again!
      noBtn.style.transform = 'translate(0px, 0px)';
    } else {
      // No more questions! Hide the buttons and show the clue
      btnContainer.style.display = 'none';
      bubble.innerHTML = "Yay! Perfect. Your first clue is hidden where you keep things cold... ❄️ Go check it, then click me again!";
    }
  }
</script>
</body>
</html>
