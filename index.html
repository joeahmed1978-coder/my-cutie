<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Cutie! 🎉</title>
  <style>
    /* Final Styling for the Cartoon Character Webpage */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe5ec, #ffc2d1); /* Warm, celebratory gradient */
      font-family: 'Poppins', sans-serif; /* Friendly font */
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 1. Speech Bubble Style (Pointing Up) */
    .speech-bubble {
      background: white;
      padding: 18px 25px;
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 1.15rem;
      font-weight: 600;
      color: #4a4a4a;
      max-width: 280px;
      text-align: center;
      cursor: pointer;
      position: relative;
      margin-bottom: 20px; /* Space above character */
      transition: all 0.2s ease;
      z-index: 10;
    }

    /* Bubble triangle */
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px 12px 0;
      border-style: solid;
      border-color: white transparent;
    }

    .speech-bubble:hover {
      transform: scale(1.05);
      background: #fdfdfd;
    }

    /* 2. Character Image Styling (No Border) */
    .character {
      width: 250px; /* Perfect size for the full body cartoon */
      height: auto; /* Mantains original aspect ratio */
      object-fit: contain;
      user-select: none; /* Prevents selecting the image */
      transform: scale(3.0);
      /* Applying the entrance and idle animations */
      animation: 
        slideUpFade 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
        floatingAction 3.5s ease-in-out infinite 1.2s; 
    }

    /* 3. Animations */
    
    /* Smooth Entrance */
    @keyframes slideUpFade {
      0% { transform: translateY(150px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Continuous Gentle Floating/Hopping */
    @keyframes floatingAction {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-18px) rotate(1deg); } /* Extra rotation adds dynamic feel */
      100% { transform: translateY(0px); }
    }

    /* Quick jump animation triggered by JS on click */
    @keyframes hop {
      0% { transform: translateY(0); }
      50% { transform: translateY(-50px) scale(1.05); }
      100% { transform: translateY(0); }
    }
    
    /* Background accents (optional hearts/stars) */
    .bg-accent {
      position: absolute;
      opacity: 0.2;
      animation: drift 10s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-200px) rotate(360deg); }
    }
.button-container {
    margin-top: 50px;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .btn {
    padding: 12px 28px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .yes-btn {
    background-color: #ff6b81;
    color: white;
  }

  .yes-btn:hover {
    background-color: #ff4757;
    transform: scale(1.1);
  }

  .no-btn {
    background-color: #f1f2f6;
    color: #57606f;
    position: relative;
  }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Container for Character & Bubble -->
<div class="container">
  <!-- Speech Bubble -->
  <div class="speech-bubble" id="speechBubble">
    Hey,i have a surprise for u if you are my cutie 🎉<br>(Click me)
  </div>

  <!-- Your Cartoon Character -->
  <img 
    src="cartoon-you.png" 
    alt="Cartoon Me" 
    class="character" 
    id="myCharacter"
    onclick="startQuestion()"
  >

  <!-- Yes/No Buttons (Hidden by default) -->
  <div class="button-container" id="buttonContainer" style="display: none;">
    <button class="btn yes-btn" onclick="handleYes()">Yes</button>
    <button class="btn no-btn" id="noBtn" onmouseover="dodgeNo()" onclick="dodgeNo()">No</button>
  </div>
</div>

  <script>
  // This runs when they click your cartoon character
  function startQuestion() {
    const bubble = document.getElementById('speechBubble');
    const btnContainer = document.getElementById('buttonContainer');
    
    // Changes the text to ask the big question!
    bubble.innerHTML = "Are you ready for your birthday clues? 🎁";
    
    // Makes the buttons appear
    btnContainer.style.display = 'flex';
  }

  // This makes the "No" button jump away when they hover over it or click it
  function dodgeNo() {
    const noBtn = document.getElementById('noBtn');
    
    // Random directions to jump
    const randomX = Math.random() * 150 - 75;
    const randomY = Math.random() * 80 - 40;
    
    noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
  }

  // This runs when they finally click "Yes"
  function handleYes() {
    const bubble = document.getElementById('speechBubble');
    const btnContainer = document.getElementById('buttonContainer');
    
    // Hides the buttons
    btnContainer.style.display = 'none';
    
    // Starts the first clue!
    bubble.innerHTML = "Yay! Perfect. Your first clue is hidden where you keep things cold... ❄️ Go check it, then click me again!";
  }
</script>
</body>
</html>
